name: Update Risk Data

on:
  schedule:
    # S'exécute tous les jours à 17h05 (Heure de Paris)
    - cron: '5 17 * * *'
  workflow_dispatch: # Permet de le lancer à la main pour tester

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install axios

      - name: Fetch and Save Data
        run: |
          node -e "
          const axios = require('axios');
          const fs = require('fs');

          async function run() {
              const d = new Date();
              d.setDate(d.getDate() + 1); // Demain
              const options = { timeZone: 'Europe/Paris', year: 'numeric', month: '2-digit', day: '2-digit' };
              const parts = new Intl.DateTimeFormat('fr-FR', options).formatToParts(d);
              const year = parts.find(p => p.type === 'year').value;
              const month = parts.find(p => p.type === 'month').value;
              const day = parts.find(p => p.type === 'day').value;
              const dateKey = \`\${year}-\${month}-\${day}\`;
              const dateStr = \`\${year}\${month}\${day}\`;

              try {
                  const response = await axios.get(\`https://www.risque-prevention-incendie.fr/static/13/import_data/\${dateStr}.json\`);
                  const data = response.data;
                  
                  let calanques = 'unknown';
                  let sainteBaume = 'unknown';

                  if (data && data.massifs) {
                      calanques = (Array.isArray(data.massifs['133']) ? data.massifs['133'][0] : data.massifs['133']) || 'unknown';
                      sainteBaume = (Array.isArray(data.massifs['1322']) ? data.massifs['1322'][0] : data.massifs['1322']) || 'unknown';
                  }

                  const payload = { date: dateKey, calanques, sainteBaume };

                  // 1. Sauvegarde du fichier temps réel pour l'appli
                  fs.writeFileSync('./previsions.json', JSON.stringify(payload, null, 2));

                  // 2. Mise à jour de l'historique cumulé
                  const historyPath = './historique.json';
                  let history = [];
                  if (fs.existsSync(historyPath)) {
                      history = JSON.parse(fs.readFileSync(historyPath, 'utf8'));
                  }
                  history = history.filter(item => item.date !== dateKey);
                  history.push(payload);
                  history.sort((a, b) => a.date.localeCompare(b.date));
                  fs.writeFileSync(historyPath, JSON.stringify(history, null, 2));

                  console.log('✅ Données mises à jour avec succès.');
              } catch (error) {
                  console.error('❌ Erreur de récupération :', error.message);
                  process.exit(1);
              }
          }
          run();
          "

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add previsions.json historique.json
          git diff-index --quiet HEAD || git commit -m "Mise à jour automatique des risques"
          git push