name: Update Risk History

on:
  schedule:
    # S'exécute tous les jours à 18h05 (Heure de Paris / 16h05 UTC)
    - cron: '5 17 * * *'
  workflow_dispatch: # Permet de le lancer à la main depuis GitHub pour tester

jobs:
  update-history:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios

      - name: Run history script
        run: |
          node -e "
          const axios = require('axios');
          const fs = require('fs');

          async function run() {
              // 1. Calcul de la date de demain
              const d = new Date();
              d.setDate(d.getDate() + 1);
              const options = { timeZone: 'Europe/Paris', year: 'numeric', month: '2-digit', day: '2-digit' };
              const parts = new Intl.DateTimeFormat('fr-FR', options).formatToParts(d);
              const year = parts.find(p => p.type === 'year').value;
              const month = parts.find(p => p.type === 'month').value;
              const day = parts.find(p => p.type === 'day').value;
              const dateKey = \`\${year}-\${month}-\${day}\`;
              const dateStr = \`\${year}\${month}\${day}\`;

              try {
                  // 2. Fetch des données de la préfecture
                  const response = await axios.get(\`https://www.risque-prevention-incendie.fr/static/13/import_data/\${dateStr}.json\`);
                  const data = response.data;
                  
                  let calanques = 'unknown';
                  let sainteBaume = 'unknown';

                  if (data && data.massifs) {
                      calanques = (Array.isArray(data.massifs['133']) ? data.massifs['133'][0] : data.massifs['133']) || 'unknown';
                      sainteBaume = (Array.isArray(data.massifs['1322']) ? data.massifs['1322'][0] : data.massifs['1322']) || 'unknown';
                  }

                  // 3. Lecture et mise à jour du fichier historique.json
                  const historyPath = './historique.json';
                  let history = [];
                  if (fs.existsSync(historyPath)) {
                      history = JSON.parse(fs.readFileSync(historyPath, 'utf8'));
                  }

                  // Évite les doublons si le script tourne deux fois
                  history = history.filter(item => item.date !== dateKey);

                  // Ajout de la nouvelle entrée
                  history.push({ date: dateKey, calanques, sainteBaume });

                  // Tri par date
                  history.sort((a, b) => a.date.localeCompare(b.date));

                  fs.writeFileSync(historyPath, JSON.stringify(history, null, 2));
                  console.log('✅ Historique mis à jour pour le ' + dateKey);
              } catch (error) {
                  console.error('❌ Impossible de récupérer les données :', error.message);
                  process.exit(1);
              }
          }
          run();
          "

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add historique.json
          git diff-index --quiet HEAD || git commit -m "📈 Mise à jour automatique de l'historique"
          git push