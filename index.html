<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Environnement - Risques Massifs 13</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Nature Environnement</h1>
        <div class="subtitle">Prévisions des Bouches-du-Rhône (13)</div>
    </header>

    <main class="container">
        <article id="card-calanques" class="zone-card card-status-unknown">
            <div class="tomorrow-section">
                <span class="tomorrow-label">Demain</span>
                <div class="zone-header">
                    <span class="zone-name">📍 Calanques</span>
                    <span id="calanques-tomorrow" class="badge-tomorrow">Chargement...</span>
                </div>
            </div>
            
            <div class="today-section">
                <span class="today-label">Risque aujourd'hui</span>
                <span id="calanques-today" class="badge-today text-status-unknown">...</span>
            </div>
        </article>

        <article id="card-saintebaume" class="zone-card card-status-unknown">
            <div class="tomorrow-section">
                <span class="tomorrow-label">Demain</span>
                <div class="zone-header">
                    <span class="zone-name">📍 Sainte-Baume</span>
                    <span id="saintebaume-tomorrow" class="badge-tomorrow">Chargement...</span>
                </div>
            </div>
            
            <div class="today-section">
                <span class="today-label">Risque aujourd'hui</span>
                <span id="saintebaume-today" class="badge-today text-status-unknown">...</span>
            </div>
        </article>
    </main>

    <footer>
        <p>Données issues de la préfecture des Bouches-du-Rhône.</p>
        <a href="https://www.risque-prevention-incendie.fr" target="_blank" rel="noopener noreferrer" class="map-link">
            🗺️ Voir la carte officielle
        </a>
    </footer>

    <script src="app.js"></script>
</body>
</html>
